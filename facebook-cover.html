<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="google-site-verification" content="zbldaRPgivgN1Kmi_EmE3Qfjua5qU2enbKVn7gPVPPE" />
  <title>CoreX Solutions — Facebook Cover Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Cormorant+Garamond:ital,wght@1,600;1,700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:28px;font-family:'Inter',sans-serif;padding:48px 24px}
    p.label{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#52525b}
    canvas{border-radius:6px;box-shadow:0 32px 80px rgba(0,0,0,.8);max-width:100%;height:auto}
    .row{display:flex;gap:12px;align-items:center}
    .btn{background:#ff6500;color:#fff;font-family:'Inter',sans-serif;font-weight:700;font-size:14px;padding:12px 28px;border:none;border-radius:8px;cursor:pointer;transition:background .2s}
    .btn:hover{background:#e85c00}
    .hint{font-size:12px;color:#52525b;text-align:center;max-width:480px;line-height:1.7}
    .hint strong{color:#9898a2}
  </style>
</head>
<body>
  <p class="label">Facebook Cover Photo · 820 × 312px (exported 2×)</p>
  <canvas id="cv" width="1640" height="624"></canvas>
  <div class="row">
    <button class="btn" id="dl">Download PNG</button>
  </div>
  <p class="hint">
    <strong>Upload tip:</strong> Facebook profile picture overlaps the bottom-left corner on desktop.<br/>All key content sits safely above and to the right of that zone.
  </p>

  <script>
    const W = 1640, H = 624;
    const cv = document.getElementById('cv');
    const ctx = cv.getContext('2d');

    document.fonts.ready.then(draw);

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // ── Base background ────────────────────────────────────────────────
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);

      // ── Noise grain ───────────────────────────────────────────────────
      addNoise(0.022);

      // ── Glow orbs — matching site hero ────────────────────────────────
      radialFill(W * 0.78, H * 0.38, 580, 'rgba(255,101,0,0.13)', 'rgba(255,101,0,0)');
      radialFill(-60,  -40,  360, 'rgba(255,101,0,0.07)', 'rgba(255,101,0,0)');
      radialFill(W * 0.78, H * 0.38, 200, 'rgba(255,140,56,0.07)', 'rgba(255,101,0,0)');

      // ── Globe rings — right side ───────────────────────────────────────
      drawGlobe(W * 0.80, H * 0.48);

      // ── Subtle horizontal rule at bottom ──────────────────────────────
      ctx.strokeStyle = 'rgba(255,255,255,0.055)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(108, H - 112);
      ctx.lineTo(W - 108, H - 112);
      ctx.stroke();

      // ── CoreX. wordmark — top left ────────────────────────────────────
      ctx.font = "800 38px 'Bricolage Grotesque', system-ui, sans-serif";
      ctx.fillStyle = '#ffffff';
      ctx.fillText('CoreX', 108, 88);
      const cx_w = ctx.measureText('CoreX').width;
      ctx.fillStyle = orangeGrad(108 + cx_w, 50, 108 + cx_w + 22, 90);
      ctx.fillText('.', 108 + cx_w, 88);

      // ── Main headline — matches landing hero ───────────────────────────
      const hy = 240;
      const lh = 104;

      // Line 1 — white bold sans
      ctx.font = "800 80px 'Bricolage Grotesque', system-ui, sans-serif";
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Get more leads from the', 108, hy);

      // Line 2 — Cormorant italic + orange gradient (matches site .grad-it)
      ctx.font = "700 92px 'Cormorant Garamond', Georgia, serif";
      const g2x = 108;
      const g2y = hy + lh;
      const g2w = ctx.measureText('tools you already have.').width;
      ctx.fillStyle = makeGrad(g2x, g2y - 80, g2x + g2w, g2y, '#ff6500', '#ff8c38', '#ffb347');
      ctx.fillText('tools you already have.', g2x, g2y);

      // Subhead — small supporting line
      ctx.font = "500 26px 'Inter', system-ui, sans-serif";
      ctx.fillStyle = '#c4c4cc';
      ctx.fillText('Website · Google profile · Lead capture · Follow-up', 108, g2y + 62);

      // ── Contact row — bottom center (safe zone) ────────────────────────
      drawContactBar();
    }

    // ── Draw D3-style globe rings ──────────────────────────────────────────
    function drawGlobe(cx, cy) {
      // Filled inner glow
      const innerG = ctx.createRadialGradient(cx, cy, 0, cx, cy, 130);
      innerG.addColorStop(0, 'rgba(255,101,0,0.09)');
      innerG.addColorStop(1, 'rgba(255,101,0,0)');
      ctx.fillStyle = innerG;
      ctx.beginPath(); ctx.arc(cx, cy, 130, 0, Math.PI * 2); ctx.fill();

      // Concentric rings — fading outward
      const rings = [160, 240, 328, 420, 516];
      rings.forEach((r, i) => {
        const a = 0.11 - i * 0.018;
        ctx.strokeStyle = `rgba(255,101,0,${a})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
      });

      // Latitude-like arc lines (subtle)
      ctx.strokeStyle = 'rgba(255,101,0,0.05)';
      ctx.lineWidth = 1;
      [-0.4, 0.0, 0.4].forEach(offset => {
        ctx.beginPath();
        ctx.ellipse(cx, cy + offset * 200, 160, 46, 0, 0, Math.PI * 2);
        ctx.stroke();
      });

      // Meridian line
      ctx.beginPath();
      ctx.ellipse(cx, cy, 46, 160, 0, 0, Math.PI * 2);
      ctx.stroke();

      // Accent dots on outer ring
      const r = 328;
      [ -0.52, 1.15, 2.3 ].forEach(angle => {
        const px = cx + Math.cos(angle) * r;
        const py = cy + Math.sin(angle) * r;
        ctx.fillStyle = '#ff6500';
        ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2); ctx.fill();

        // Subtle pulse ring
        ctx.strokeStyle = 'rgba(255,101,0,0.25)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(px, py, 12, 0, Math.PI * 2); ctx.stroke();
      });
    }

    // ── Contact info bar ──────────────────────────────────────────────────
    function drawContactBar() {
      const y = H - 56;
      ctx.font = "500 24px 'Inter', system-ui, sans-serif";
      ctx.fillStyle = '#9898a2';

      const items = [
        { text: '(678) 835-8150' },
        { text: 'info@corexsolutions.net' },
        { text: 'www.corexsolutions.net' },
      ];

      // Measure total width to center
      const sepW = 2;
      const sepGap = 40;
      let totalW = 0;
      const widths = items.map(it => {
        const w = ctx.measureText(it.text).width;
        totalW += w;
        return w;
      });
      totalW += (items.length - 1) * (sepGap * 2 + sepW);

      let x = (W - totalW) / 2;

      items.forEach((item, i) => {
        ctx.fillStyle = '#9898a2';
        ctx.fillText(item.text, x, y);
        x += widths[i];

        if (i < items.length - 1) {
          x += sepGap;
          ctx.fillStyle = 'rgba(255,255,255,0.12)';
          ctx.fillRect(x, y - 18, sepW, 22);
          x += sepW + sepGap;
        }
      });

      // Highlight website in orange
      let hx = (W - totalW) / 2 + widths[0] + sepGap * 2 + sepW + widths[1] + sepGap * 2 + sepW;
      ctx.fillStyle = '#ff6500';
      ctx.fillText('www.corexsolutions.net', hx, y);
    }

    // ── Helpers ────────────────────────────────────────────────────────────
    function radialFill(cx, cy, r, colorIn, colorOut) {
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, colorIn);
      g.addColorStop(1, colorOut);
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }

    function makeGrad(x0, y0, x1, y1, ...stops) {
      const g = ctx.createLinearGradient(x0, y0, x1, y1);
      stops.forEach((c, i) => g.addColorStop(i / (stops.length - 1), c));
      return g;
    }

    function orangeGrad(x0, y0, x1, y1) {
      return makeGrad(x0, y0, x1, y1, '#ff6500', '#ff8c38');
    }

    function addNoise(intensity) {
      const img = ctx.getImageData(0, 0, W, H);
      const d = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const n = (Math.random() - 0.5) * intensity * 255;
        d[i]   = clamp(d[i]   + n);
        d[i+1] = clamp(d[i+1] + n);
        d[i+2] = clamp(d[i+2] + n);
      }
      ctx.putImageData(img, 0, 0);
    }

    function clamp(v) { return Math.min(255, Math.max(0, v)); }

    // ── Download ──────────────────────────────────────────────────────────
    document.getElementById('dl').addEventListener('click', () => {
      const a = document.createElement('a');
      a.download = 'corex-facebook-cover.png';
      a.href = cv.toDataURL('image/png');
      a.click();
    });
  </script>
</body>
</html>
