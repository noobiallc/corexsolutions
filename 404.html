<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — CoreX Solutions</title>
  <meta name="robots" content="noindex"/>
  <meta name="theme-color" content="#ff6500"/>
  <link rel="icon" type="image/svg+xml" href="/images/logo.svg"/>
  <link rel="apple-touch-icon" href="/images/logo.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Cormorant+Garamond:ital,wght@1,600;1,700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;font-size:16px}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:#0a0a0a;color:#fff;
      -webkit-font-smoothing:antialiased;
      line-height:1.5;
      min-height:100vh;
      display:flex;flex-direction:column;
    }
    a{text-decoration:none;color:inherit}
    :root{
      --orange:#ff6500;--orange-hi:#ff8c38;
      --text-2:#c4c4cc;--text-3:#9898a2;
    }
    .grad{
      background:linear-gradient(135deg,var(--orange) 0%,var(--orange-hi) 60%,#ffb347 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .grad-it{
      font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:700;
      background:linear-gradient(135deg,var(--orange) 0%,var(--orange-hi) 60%,#ffb347 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }

    /* Nav — logo only */
    #nav{
      background:rgba(255,255,255,.92);backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.08);
    }
    .nav-inner{
      max-width:1280px;margin:0 auto;padding:0 32px;
      height:62px;display:flex;align-items:center;
    }
    @media(max-width:768px){.nav-inner{padding:0 20px}}
    .nav-logo{font-size:20px;font-weight:900;letter-spacing:-.03em;color:#0a0a0a}

    /* Content */
    .page{
      flex:1;display:flex;align-items:center;justify-content:center;
      padding:80px 24px;text-align:center;position:relative;overflow:hidden;
    }
    .orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}

    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .d1{animation:fadeUp .65s .08s ease-out forwards;opacity:0}
    .d2{animation:fadeUp .65s .18s ease-out forwards;opacity:0}
    .d3{animation:fadeUp .65s .30s ease-out forwards;opacity:0}
    .d4{animation:fadeUp .65s .44s ease-out forwards;opacity:0}

    .btn{
      display:inline-flex;align-items:center;gap:8px;
      font-family:'Inter',sans-serif;font-weight:600;font-size:15px;
      padding:14px 28px;border-radius:10px;border:none;cursor:pointer;
      transition:all .2s ease;white-space:nowrap;text-decoration:none;
    }
    .btn-primary{
      background:var(--orange);color:#fff;
      box-shadow:0 4px 24px rgba(255,101,0,.35);
    }
    .btn-primary:hover{background:#e85c00;transform:translateY(-1px)}
  </style>
</head>
<body>

<!-- Logo-only nav -->
<nav id="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">CoreX<span class="grad">.</span></a>
  </div>
</nav>

<div class="page">
  <div class="orb" style="width:600px;height:500px;background:rgba(255,101,0,.07);top:50%;left:50%;transform:translate(-50%,-50%)"></div>

  <div style="position:relative;max-width:520px">

    <p class="d1" style="font-size:clamp(80px,14vw,128px);font-weight:900;letter-spacing:-.05em;line-height:1;color:#1c1c1c;margin-bottom:4px">404</p>

    <h1 class="d2" style="font-family:'Bricolage Grotesque',system-ui,sans-serif;font-size:clamp(26px,3.5vw,38px);font-weight:800;letter-spacing:-.02em;line-height:1.15;margin-bottom:12px">
      This page doesn't <em class="grad-it">exist.</em>
    </h1>

    <p class="d3" style="font-size:17px;color:var(--text-2);line-height:1.65;margin-bottom:36px">
      But we can still help your business get more calls.
    </p>

    <div class="d4" style="display:flex;flex-direction:column;align-items:center;gap:16px">
      <a href="contact-us.html" class="btn btn-primary">Get a Free Growth Review</a>
      <a href="index.html" style="font-size:16px;color:var(--text-3);transition:color .2s" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--text-3)'">
        Or go back to the homepage →
      </a>
    </div>

  </div>
</div>

</body>
</html>
