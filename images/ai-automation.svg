<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="AI Automation for Small Businesses">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f9ff"/>
      <stop offset="50%" stop-color="#eaf1fb"/>
      <stop offset="100%" stop-color="#dde8f6"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0.18" cy="0.5" r="0.45">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0.82" cy="0.5" r="0.45">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#glowLeft)"/>
  <rect width="1200" height="600" fill="url(#glowRight)"/>

  <!-- Subtle circuit grid -->
  <g stroke="#2563eb" stroke-opacity="0.14" stroke-width="1" fill="none">
    <path d="M0,120 L240,120 L260,140 L420,140"/>
    <path d="M0,480 L180,480 L200,460 L360,460"/>
    <path d="M840,80 L1000,80 L1020,100 L1200,100"/>
    <path d="M900,540 L1080,540 L1100,520 L1200,520"/>
    <circle cx="240" cy="120" r="3" fill="#2563eb" fill-opacity="0.45"/>
    <circle cx="180" cy="480" r="3" fill="#2563eb" fill-opacity="0.45"/>
    <circle cx="1000" cy="80" r="3" fill="#06b6d4" fill-opacity="0.5"/>
    <circle cx="1080" cy="540" r="3" fill="#06b6d4" fill-opacity="0.5"/>
  </g>

  <!-- Faint dot field -->
  <g fill="#2563eb" fill-opacity="0.2">
    <circle cx="80" cy="80" r="1.6"/><circle cx="140" cy="60" r="1.1"/><circle cx="200" cy="90" r="1.3"/>
    <circle cx="60" cy="250" r="1.1"/><circle cx="150" cy="330" r="1.6"/><circle cx="40" cy="400" r="1.1"/>
    <circle cx="1100" cy="80" r="1.6"/><circle cx="1040" cy="150" r="1.1"/><circle cx="1140" cy="200" r="1.3"/>
    <circle cx="1150" cy="360" r="1.1"/><circle cx="1060" cy="420" r="1.4"/><circle cx="1130" cy="500" r="1.1"/>
  </g>

  <!-- ===== LEFT ICON — Brain in Gear ===== -->
  <g transform="translate(200,300)" stroke="url(#accent)" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
    <g>
      <circle cx="0" cy="0" r="98" stroke-opacity="0.28"/>
      <g>
        <rect x="-6" y="-120" width="12" height="18" rx="2" fill="url(#accent)" stroke="none"/>
        <g transform="rotate(30)"><rect x="-6" y="-120" width="12" height="18" rx="2" fill="url(#accent)" stroke="none"/></g>
        <g transform="rotate(60)"><rect x="-6" y="-120" width="12" height="18" rx="2" fill="url(#accent)" stroke="none"/></g>
        <g transform="rotate(90)"><rect x="-6" y="-120" width="12" height="18" rx="2" fill="url(#accent)" stroke="none"/></g>
        <g transform="rotate(120)"><rect x="-6" y="-120" width="12" height="18" rx="2" fill="url(#accent)" stroke="none"/></g>
        <g transform="rotate(150)"><rect x="-6" y="-120" width="12" height="18" rx="2" fill="url(#accent)" stroke="none"/></g>
        <g transform="rotate(180)"><rect x="-6" y="-120" width="12" height="18" rx="2" fill="url(#accent)" stroke="none"/></g>
        <g transform="rotate(210)"><rect x="-6" y="-120" width="12" height="18" rx="2" fill="url(#accent)" stroke="none"/></g>
        <g transform="rotate(240)"><rect x="-6" y="-120" width="12" height="18" rx="2" fill="url(#accent)" stroke="none"/></g>
        <g transform="rotate(270)"><rect x="-6" y="-120" width="12" height="18" rx="2" fill="url(#accent)" stroke="none"/></g>
        <g transform="rotate(300)"><rect x="-6" y="-120" width="12" height="18" rx="2" fill="url(#accent)" stroke="none"/></g>
        <g transform="rotate(330)"><rect x="-6" y="-120" width="12" height="18" rx="2" fill="url(#accent)" stroke="none"/></g>
      </g>
      <circle cx="0" cy="0" r="108" stroke-opacity="0.42"/>
    </g>

    <!-- Brain (two hemispheres) -->
    <path d="M -4 -70 C -30 -70 -55 -55 -55 -28 C -70 -22 -75 -5 -62 12 C -70 28 -58 48 -40 50 C -35 66 -15 72 -4 62 L -4 -70 Z" stroke-opacity="0.95"/>
    <path d="M 4 -70 C 30 -70 55 -55 55 -28 C 70 -22 75 -5 62 12 C 70 28 58 48 40 50 C 35 66 15 72 4 62 L 4 -70 Z" stroke-opacity="0.95"/>
    <path d="M -20 -40 C -35 -30 -35 -10 -20 0" stroke-opacity="0.55"/>
    <path d="M -15 5 C -30 15 -30 35 -10 40" stroke-opacity="0.55"/>
    <path d="M 20 -40 C 35 -30 35 -10 20 0" stroke-opacity="0.55"/>
    <path d="M 15 5 C 30 15 30 35 10 40" stroke-opacity="0.55"/>
    <circle cx="-25" cy="-20" r="2.8" fill="url(#accent)" stroke="none"/>
    <circle cx="25" cy="-20" r="2.8" fill="url(#accent)" stroke="none"/>
    <circle cx="-20" cy="30" r="2.8" fill="url(#accent)" stroke="none"/>
    <circle cx="20" cy="30" r="2.8" fill="url(#accent)" stroke="none"/>
  </g>

  <!-- ===== CENTER TEXT ===== -->
  <g font-family="'Bricolage Grotesque','Inter',system-ui,sans-serif" text-anchor="middle">
    <text x="600" y="290" font-size="72" font-weight="800" fill="#0f1e3d" letter-spacing="-1">AI Automation</text>
    <text x="600" y="350" font-size="28" font-weight="500" fill="#475569" letter-spacing="0.5">for Small Businesses</text>
    <rect x="560" y="378" width="80" height="3" rx="1.5" fill="url(#accent)"/>
  </g>

  <!-- ===== RIGHT — Floating chart cards ===== -->
  <g transform="translate(1000,300)" filter="url(#softGlow)">
    <g transform="translate(-20,-90)">
      <rect x="0" y="0" width="150" height="100" rx="10" fill="#ffffff" stroke="#2563eb" stroke-opacity="0.4" stroke-width="1.5"/>
      <rect x="18" y="60" width="14" height="24" rx="2" fill="url(#accent)"/>
      <rect x="40" y="42" width="14" height="42" rx="2" fill="url(#accent)" opacity="0.85"/>
      <rect x="62" y="30" width="14" height="54" rx="2" fill="url(#accent)" opacity="0.9"/>
      <rect x="84" y="18" width="14" height="66" rx="2" fill="url(#accent)"/>
      <rect x="106" y="34" width="14" height="50" rx="2" fill="url(#accent)" opacity="0.85"/>
      <line x1="14" y1="86" x2="136" y2="86" stroke="#2563eb" stroke-opacity="0.28" stroke-width="1"/>
    </g>

    <g transform="translate(110,-150)">
      <rect x="0" y="0" width="86" height="56" rx="8" fill="#ffffff" stroke="#06b6d4" stroke-opacity="0.5" stroke-width="1.2"/>
      <polyline points="10,42 25,30 40,36 55,18 72,24" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="72" cy="24" r="3" fill="url(#accent)"/>
    </g>

    <g transform="translate(-50,30)">
      <rect x="0" y="0" width="96" height="96" rx="10" fill="#ffffff" stroke="#2563eb" stroke-opacity="0.4" stroke-width="1.2"/>
      <circle cx="48" cy="48" r="26" fill="none" stroke="#2563eb" stroke-opacity="0.25" stroke-width="6"/>
      <path d="M 48 22 A 26 26 0 1 1 26.5 62" fill="none" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    </g>

    <g transform="translate(60,40)">
      <rect x="0" y="0" width="92" height="70" rx="8" fill="#ffffff" stroke="#06b6d4" stroke-opacity="0.5" stroke-width="1.2"/>
      <rect x="12" y="44" width="10" height="16" rx="1.5" fill="url(#accent)"/>
      <rect x="28" y="34" width="10" height="26" rx="1.5" fill="url(#accent)" opacity="0.8"/>
      <rect x="44" y="24" width="10" height="36" rx="1.5" fill="url(#accent)" opacity="0.9"/>
      <rect x="60" y="14" width="10" height="46" rx="1.5" fill="url(#accent)"/>
    </g>
  </g>
</svg>
